# Application Properties
spring.application.name=certifypro-backend
server.port=${PORT:8080}

# Database
# Defaults to local MySQL.
# Override with MYSQL_URL, MYSQL_USER and MYSQL_PASSWORD as needed.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/certifypro?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Mohi@207}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:8000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:3000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME:60000}
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:change-this-dev-jwt-secret-key-to-a-secure-32-plus-char-value}
jwt.expiration=${JWT_EXPIRATION:604800000}

# File Upload (local storage)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# Email
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USER:your@gmail.com}
spring.mail.password=${EMAIL_PASS:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=${EMAIL_CONNECTION_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.timeout=${EMAIL_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.writetimeout=${EMAIL_WRITE_TIMEOUT_MS:10000}
spring.mail.properties.mail.debug=${EMAIL_DEBUG:false}
email.mock=${EMAIL_MOCK:false}
email.from=${EMAIL_FROM:CertifyPro <noreply@certifypro.com>}

# Admin Seed Account
admin.email=${ADMIN_EMAIL:admin@example.com}
admin.password=${ADMIN_PASSWORD:ChangeMe123!}
admin.name=${ADMIN_NAME:System Admin}
admin.seed-enabled=${ADMIN_SEED_ENABLED:false}

# CORS - Frontend URL
frontend.url=${CLIENT_URL:https://certificate-management-system-zeta.vercel.app/login}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=${HEALTH_MAIL_ENABLED:false}
management.health.db.enabled=${HEALTH_DB_ENABLED:false}

# Logging (INFO in production for performance)
logging.level.com.certifypro=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
